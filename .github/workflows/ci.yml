name: CI Node.js

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '19.x'

    - name: Instalar dependencias
      run: npm install

    - name: Ejecutar Tests
      run: npm test